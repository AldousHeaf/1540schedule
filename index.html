<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1540 Schedule</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <h1>1540</h1>
            <span>Schedule</span>
            <input type="search" id="searchInput" class="search-input" placeholder="Search by name…" aria-label="Search by name">
            <button type="button" id="regenerateBtn" class="regenerate-btn">Regenerate</button>
        </div>
    </header>

    <div id="rolePanel" class="role-panel hidden" aria-hidden="true">
        <div class="role-panel-inner">
            <button type="button" class="role-panel-close" aria-label="Close"><span aria-hidden="true">×</span></button>
            <div class="role-panel-header">
                <h2 id="rolePanelTitle" class="role-panel-title"></h2>
            </div>
            <div id="rolePanelBody" class="role-panel-body"></div>
        </div>
    </div>

    <main class="main">
        <div id="scheduleContainer" class="schedule-wrap"></div>
    </main>

    <script src="schedule.js"></script>
</body>
</html>
